# Phase 1: Bootstrap as root (Terraform puts your SSH key on root).
# Creates admin user, hardens SSH (disables root login), installs Docker.
# One-shot — root login is disabled after this phase. Re-runs use Phase 2 only.
- name: Bootstrap VPS
  hosts: web
  user: root

  pre_tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 300

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - role: base
      tags: base
    - role: security
      tags: security
    - role: docker
      tags: docker

# Phase 2: Configure as admin user (root login is now disabled)
# Sets up deploy user, repos, Docker network. CD handles deploys.
- name: Configure platform
  hosts: web
  user: "{{ admin_user }}"
  become: true
  vars:
    ansible_become_password: "{{ vault_admin_password_plain }}"

  pre_tasks:
    - name: Verify SSH connectivity as admin
      ansible.builtin.wait_for_connection:
        timeout: 30

  roles:
    - role: infra
      tags: infra
