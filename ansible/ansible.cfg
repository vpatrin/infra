[defaults]
inventory = inventory/hosts.ini
roles_path = roles
vault_password_file = ~/.ansible_vault_pass
# Don't litter .retry files on failed plays
retry_files_enabled = false
# Human-readable task output instead of default JSON blobs
stdout_callback = default
result_format = yaml
# SSH timeout — 30s for slow Hetzner connections during bootstrap
timeout = 30
# Execute modules in-process over SSH instead of copying temp files — faster over WAN
pipelining = true

[privilege_escalation]
become = true
become_method = sudo
