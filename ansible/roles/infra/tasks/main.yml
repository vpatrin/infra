# --- Deploy user permissions ---
- name: Add admin user to deploy group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: "{{ deploy_user }}"
    append: true

- name: Install deploy SSH public key
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ vault_deploy_ssh_public_key }}"
  when: vault_deploy_ssh_public_key is defined

- name: Configure scoped sudo for deploy user
  ansible.builtin.copy:
    content: |
      deploy ALL=(ALL) NOPASSWD: /usr/bin/systemctl daemon-reload, \
        /usr/bin/systemctl enable pg-backup.timer disk-alert.timer, \
        /usr/bin/systemctl start pg-backup.timer disk-alert.timer, \
        /usr/bin/tee /etc/systemd/system/pg-backup.service, \
        /usr/bin/tee /etc/systemd/system/pg-backup.timer, \
        /usr/bin/tee /etc/systemd/system/disk-alert.service, \
        /usr/bin/tee /etc/systemd/system/disk-alert.timer
    dest: /etc/sudoers.d/deploy
    mode: "0440"
    validate: visudo -cf %s

# --- Tooling ---
- name: Install sops
  ansible.builtin.apt:
    deb: "https://github.com/getsops/sops/releases/download/v{{ sops_version }}/sops_{{ sops_version }}_amd64.deb"

# --- Repos and static assets ---
- name: Clone infra repo
  become: true
  become_user: "{{ deploy_user }}"
  ansible.builtin.git:
    repo: "{{ infra_repo }}"
    dest: "{{ infra_dir }}"
    version: main

- name: Clone coupette repo
  become: true
  become_user: "{{ deploy_user }}"
  ansible.builtin.git:
    repo: "{{ coupette_repo }}"
    dest: "{{ coupette_dir }}"
    version: main

- name: Create frontend static files directory
  ansible.builtin.file:
    path: "{{ coupette_frontend_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

# --- Docker platform prerequisites (external resources for compose stacks) ---
- name: Create Docker internal network
  community.docker.docker_network:
    name: internal

- name: Create external Docker volumes
  community.docker.docker_volume:
    name: "{{ item }}"
  loop:
    - shared-postgres_pgdata
    - uptime-kuma_uptime-kuma-data
