name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CADDY_VERSION: "2.11.2"
  TERRAFORM_VERSION: "1.14.7"

jobs:
  compose:
    name: Validate compose
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Create .env files from examples
        run: |
          find stacks -name "*.env.example" | while read -r example; do
            cp "$example" "${example%.example}"
          done
      - name: Validate each stack
        run: |
          set -e
          for stack in stacks/*/; do
            name=$(basename "$stack")
            base="${stack}docker-compose.yml"
            [ -f "$base" ] || continue
            echo "==> $name (base)"
            docker compose -f "$base" config --quiet
            if [ -f "${stack}docker-compose.dev.yml" ]; then
              echo "==> $name (dev)"
              docker compose -f "$base" -f "${stack}docker-compose.dev.yml" config --quiet
            fi
            if [ -f "${stack}docker-compose.prod.yml" ]; then
              echo "==> $name (prod)"
              docker compose -f "$base" -f "${stack}docker-compose.prod.yml" config --quiet
            fi
          done

  caddy:
    name: Validate Caddyfile
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/stacks/caddy/Caddyfile:/etc/caddy/Caddyfile:ro \
            caddy:${{ env.CADDY_VERSION }} caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -type f | while read -r script; do
            echo "Checking $script..."
            shellcheck --severity=warning "$script"
          done

  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Terraform init and validate
        working-directory: terraform
        run: |
          terraform fmt -check
          terraform init -backend=false
          terraform validate

  ansible:
    name: Lint Ansible
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Install ansible-lint
        run: pip install ansible-lint==26.3.0
      - name: Install Galaxy roles and collections
        working-directory: ansible
        run: ansible-galaxy install -r requirements.yml
      - name: Create dummy vault password for syntax-check
        run: echo "ci-dummy" > ~/.ansible_vault_pass
      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
