name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Validate compose
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Create .env files from examples
        run: |
          for dir in services/postgres services/umami services/grafana services/alloy; do
            cp "$dir/.env.example" "$dir/.env"
            cp "$dir/.env.example" "$dir/.env.prod"
          done
      - name: Validate dev compose (base + dev)
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet
      - name: Validate prod compose (base + prod)
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  caddy:
    name: Validate Caddyfile
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      CADDY_DIR: services/caddy
      CADDY_VERSION: "2.11.2"
    steps:
      - uses: actions/checkout@v6
      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/${CADDY_DIR}:/etc/caddy:ro \
            caddy:${CADDY_VERSION} caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -type f | while read -r script; do
            echo "Checking $script..."
            shellcheck --severity=warning "$script"
          done

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
