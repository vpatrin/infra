name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Validate compose
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Create .env files from examples
        run: |
          cp services/postgres/.env.example services/postgres/.env
          cp services/umami/.env.example services/umami/.env
      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  caddy:
    name: Validate Caddyfile
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      CADDY_DIR: services/caddy
      CADDY_VERSION: "2.11"
    steps:
      - uses: actions/checkout@v6
      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/${CADDY_DIR}:/etc/caddy:ro \
            caddy:${CADDY_VERSION} caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -type f | while read -r script; do
            echo "Checking $script..."
            shellcheck --severity=warning "$script"
          done

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
