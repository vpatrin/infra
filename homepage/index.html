<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Patrin — DevOps & Software Engineer</title>
    <meta name="description" content="Senior DevOps & Software Engineer. Python, Kubernetes, GCP. Available for freelance consulting.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --fg: #e8e8e8;
            --accent: #ff5722;
            --muted: #666;
            --border: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .header { margin-bottom: 64px; }

        .name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .name span { color: var(--accent); }

        .tagline {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .tagline::before {
            content: "$ ";
            color: var(--accent);
        }

        .links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--fg);
            text-decoration: none;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        .links a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        section { margin-bottom: 56px; }

        h2 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .about p {
            color: var(--fg);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .highlight {
            color: var(--accent);
            font-weight: 700;
        }

        .stack-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 8px 24px;
            font-size: 13px;
        }

        .stack-label {
            color: var(--muted);
            text-align: right;
        }

        .stack-value { color: var(--fg); }

        .project {
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .project:hover { border-color: var(--accent); }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .project-name {
            font-weight: 700;
            font-size: 15px;
        }

        .project-status {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .project-status.live { color: #4caf50; }
        .project-status.wip { color: var(--muted); }

        .project-desc {
            color: var(--muted);
            font-size: 13px;
        }

        .project-stack {
            color: var(--accent);
            font-size: 11px;
            margin-top: 8px;
        }

        .project-links {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a1a1a;
        }

        .project-link {
            font-size: 12px;
            color: var(--fg);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
            transition: border-color 0.2s, color 0.2s;
        }

        .project-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .link-icon {
            width: 14px;
            height: 14px;
            vertical-align: -2px;
            margin-right: 4px;
        }

        .project-link.soon,
        .project-link.soon:hover {
            color: var(--muted);
            border-bottom: 1px dashed var(--border);
            cursor: default;
        }

        .exp-item { margin-bottom: 24px; }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }

        .exp-role {
            font-weight: 700;
            font-size: 14px;
        }

        .exp-date {
            color: var(--muted);
            font-size: 12px;
        }

        .exp-company {
            color: var(--accent);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .exp-desc {
            color: var(--muted);
            font-size: 13px;
        }

        .available {
            border: 1px solid var(--accent);
            padding: 24px;
            margin-bottom: 56px;
            position: relative;
        }

        .available::before {
            content: "";
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 3px;
            background: var(--accent);
        }

        .available-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .available p {
            font-size: 13px;
            color: var(--fg);
            margin-bottom: 8px;
        }

        .available .services {
            color: var(--muted);
            font-size: 13px;
        }

        footer {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            color: var(--muted);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .name { font-size: 32px; }
            .container { padding: 48px 16px; }
            .stack-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .stack-label { text-align: left; }
            .exp-header { flex-direction: column; gap: 2px; }
        }
    </style>
    <script async src="https://analytics.victorpatrin.dev/script.js" data-website-id="d5d1ef06-ca93-4a2e-9de9-1e820456ed2d"></script>
</head>
<body>
    <div class="container">
        <header class="header" id="header"></header>
        <div class="available" id="available"></div>
        <section class="about" id="about"></section>
        <section id="stack-section"></section>
        <section id="projects-section"></section>
        <section id="experience-section"></section>
        <section id="education-section"></section>
        <footer id="footer"></footer>
    </div>

    <script src="content.js"></script>
    <script>
        document.getElementById("header").innerHTML = `
            <h1 class="name">${content.name} <span>${content.surname}</span></h1>
            <div class="tagline">${content.tagline}<span class="cursor"></span></div>
            <div class="links">
                ${content.links.map(l => `<a href="${l.url}" data-umami-event="click-${l.label}" target="_blank" rel="noopener">${l.label}</a>`).join("")}
            </div>
        `;

        document.getElementById("available").innerHTML = `
            <div class="available-title">${content.available.title}</div>
            <p>${content.available.description}</p>
            <div class="services">${content.available.services}</div>
        `;

        document.getElementById("about").innerHTML = `
            <h2>About</h2>
            ${content.about.map(p => `<p>${p}</p>`).join("")}
        `;

        document.getElementById("stack-section").innerHTML = `
            <h2>Stack</h2>
            <div class="stack-grid">
                ${content.stack.map(s => `
                    <span class="stack-label">${s.label}</span>
                    <span class="stack-value">${s.value}</span>
                `).join("")}
            </div>
        `;

        document.getElementById("projects-section").innerHTML = `
            <h2>Projects</h2>
            ${content.projects.map(p => `
                <div class="project" data-umami-event="project-view" data-umami-event-project="${p.name}">
                    <div class="project-header">
                        <span class="project-name">${p.name}</span>
                        <span class="project-status ${p.status === "live" ? "live" : "wip"}">${p.status}</span>
                    </div>
                    <div class="project-desc">${p.desc}</div>
                    <div class="project-stack">${p.stack}</div>
                    <div class="project-links">
                        ${(p.links || []).map(l => l.soon
                            ? `<span class="project-link soon">${l.icon || ""}${l.label}</span>`
                            : `<a class="project-link" href="${l.url}" data-umami-event="project-click-${p.name}-${l.label}" target="_blank" rel="noopener">${l.icon || ""}${l.label}</a>`
                        ).join("")}
                    </div>
                </div>
            `).join("")}
        `;

        document.getElementById("experience-section").innerHTML = `
            <h2>Experience</h2>
            ${content.experience.map(e => `
                <div class="exp-item">
                    <div class="exp-header">
                        <span class="exp-role">${e.role}</span>
                        <span class="exp-date">${e.date}</span>
                    </div>
                    <div class="exp-company">${e.company}</div>
                    ${e.desc ? `<div class="exp-desc">${e.desc}</div>` : ""}
                </div>
            `).join("")}
        `;

        document.getElementById("education-section").innerHTML = `
            <h2>Education</h2>
            ${content.education.map(e => `
                <div class="exp-item">
                    <div class="exp-header">
                        <span class="exp-role">${e.role}</span>
                        <span class="exp-date">${e.date}</span>
                    </div>
                    <div class="exp-company">${e.company}</div>
                </div>
            `).join("")}
        `;

        document.getElementById("footer").innerHTML = `
            <span>${content.footer.left}</span>
            <span>${content.footer.location} — <a href="mailto:${content.footer.email}">${content.footer.email}</a></span>
        `;
    </script>
</body>
</html>
