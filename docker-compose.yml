services:
  caddy:
    image: caddy:2.11.2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddy configuration (directory mount for live reload)
      - ./services/caddy:/etc/caddy:ro
      # Homepage files (Portfolio)
      - ./services/homepage:/srv/homepage:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: shared-postgres
    shm_size: 256mb
    volumes:
      - shared-postgres_pgdata:/var/lib/postgresql/data
      - ./services/postgres/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    security_opt: [no-new-privileges:true]
    # Drop everything, then re-add only what Postgres needs to init its data dir.
    cap_drop: [ALL]
    # TODO: re-evaluate these caps for production.
    cap_add: [SETUID, SETGID, DAC_READ_SEARCH, CHOWN, FOWNER]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.20.2
    container_name: umami
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma_uptime-kuma-data:/app/data
    networks:
      - internal
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Observability
  # ============================================================================

  loki:
    image: grafana/loki:3.5.12
    container_name: loki
    volumes:
      - ./services/loki:/etc/loki:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yaml
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    volumes:
      - ./services/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.14.1
    container_name: alloy
    volumes:
      - ./services/alloy:/etc/alloy:ro
      - alloy_data:/var/lib/alloy/data
      # Docker socket: container discovery + log tailing.
      # Grants effective root
      # TODO: replace with docker-socket-proxy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # /proc: CPU, memory, load, network counters
      - /proc:/host/proc:ro
      # /sys: hardware topology, device stats
      - /sys:/host/sys:ro
      # rootfs: disk capacity, usage, inodes (node_filesystem_* metrics)
      - /:/host/root:ro
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [DAC_READ_SEARCH]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:12.4.1
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  shared-postgres_pgdata:
    external: true
  uptime-kuma_uptime-kuma-data:
    external: true
  loki_data:
  prometheus_data:
  alloy_data:
  grafana_data:

networks:
  internal:
    external: true
