services:
  caddy:
    image: caddy:2.11
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile for configuration
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      # Homepage files (Portfolio)
      - ./services/homepage:/srv/homepage
      # coupette.club frontend dist files
      - /srv/coupette:/srv/coupette
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: shared-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only — for DBeaver, Alembic
    shm_size: 256mb
    volumes:
      - shared-postgres_pgdata:/var/lib/postgresql/data
      - ./services/postgres/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    security_opt: [no-new-privileges:true]
    # Drop everything, then re-add only what Postgres needs to init its data dir.
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, FOWNER]
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  umami:
    image: ghcr.io/umami-software/postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Localhost only — Caddy proxies public traffic
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"  # Localhost only — Caddy proxies public traffic
    volumes:
      - uptime-kuma_uptime-kuma-data:/app/data
    networks:
      - internal
    security_opt: [no-new-privileges:true]
    # setpriv needs these caps to switch user/group at startup.
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  shared-postgres_pgdata:
    external: true
  uptime-kuma_uptime-kuma-data:
    external: true

networks:
  internal:
    external: true
