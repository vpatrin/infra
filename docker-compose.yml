services:
  caddy:
    image: caddy:2.9
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile for configuration
      - ./Caddyfile:/etc/caddy/Caddyfile
      # Homepage files (Portfolio)
      - ./homepage:/srv/homepage
      # coupette.club frontend dist files
      - /srv/coupette:/srv/coupette
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    external: true
