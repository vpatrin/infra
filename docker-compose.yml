services:
  caddy:
    image: caddy:2.11.2
    container_name: caddy
    volumes:
      # Caddy configuration (directory mount for live reload)
      - ./services/caddy:/etc/caddy:ro
      # Homepage files (Portfolio)
      - ./services/homepage:/srv/homepage:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2019/config/ -o /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  shared-postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: shared-postgres
    # Postgres uses /dev/shm for parallel query workers, sorting, and hash joins.
    # Docker default is 64mb — too small for pgvector workloads. 256mb matches pg defaults.
    shm_size: 256mb
    volumes:
      - shared-postgres_pgdata:/var/lib/postgresql/data
      - ./services/postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt: [no-new-privileges:true]
    # Drop everything, then re-add only what Postgres needs to init its data dir.
    cap_drop: [ALL]
    # TODO: re-evaluate these caps for production.
    cap_add: [SETUID, SETGID, DAC_READ_SEARCH, CHOWN, FOWNER]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    depends_on:
      shared-postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:3000/api/heartbeat\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma_uptime-kuma-data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:3001\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coupette-redis:
    image: redis:8-bookworm
    container_name: coupette-redis
    command: redis-server --save "" --appendonly no --bind 0.0.0.0
    user: redis
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    mem_limit: 64m
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Observability
  # ============================================================================

  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./services/loki:/etc/loki:ro
      - loki_data:/loki
    networks:
      - internal
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./services/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: ghcr.io/google/cadvisor@sha256:5534ae91cbf3428998d60428d107cfdd97272d80658534ac6e54d8ce3b0c4d72
    container_name: cadvisor
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=15s"
      - "--disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal
    pid: host
    cgroup: host
    read_only: true
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: alloy
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "--disable-reporting"
      - "--stability.level=generally-available"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./services/alloy:/etc/alloy:ro
      - alloy_data:/var/lib/alloy/data
      # loki.source.docker: container log tailing
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # loki.source.journal: systemd timer/service logs
      - /var/log/journal:/var/log/journal:ro
      # node_exporter (procfs_path): CPU, memory, load, network counters
      - /proc:/host/proc:ro
      # node_exporter (sysfs_path): hardware topology, device stats
      - /sys:/host/sys:ro
      # node_exporter (rootfs_path): disk capacity, usage, inodes
      - /:/host/root:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [DAC_READ_SEARCH, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  shared-postgres_pgdata:
    external: true
  uptime-kuma_uptime-kuma-data:
    external: true
  loki_data:
  prometheus_data:
  alloy_data:
  grafana_data:

networks:
  internal:
    external: true
