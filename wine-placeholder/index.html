<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQ Sommelier — Coming Soon</title>
    <meta name="description" content="AI wine discovery engine for Quebec's SAQ wines.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --fg: #e8e8e8;
            --accent: #ff5722;
            --muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        h1 span { color: var(--accent); }

        .tagline {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .tagline::before {
            content: "$ ";
            color: var(--accent);
        }

        .bot-link {
            color: var(--fg);
            font-size: 13px;
            border-bottom: 1px solid var(--muted);
            padding-bottom: 2px;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .bot-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>saq<span>-sommelier</span></h1>
        <div class="tagline">web app coming soon<span class="cursor"></span></div>
        <a class="bot-link" href="https://t.me/AlerteVinBot" target="_blank" rel="noopener">try the telegram bot</a>
    </div>
</body>
</html>
