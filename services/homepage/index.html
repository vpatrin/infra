<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Patrin — Senior Software Engineer</title>
    <meta name="description" content="Senior Software Engineer. Python, Kubernetes, GCP, AI. Available for freelance and full-time roles.">
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 100 800;
            font-display: swap;
            src: url('fonts/JetBrainsMono-variable.woff2') format('woff2');
        }

        :root {
            --bg: #0a0a0a;
            --fg: #e8e8e8;
            --accent: #ff5722;
            --muted: #888;
            --border: #1e1e1e;
            --green: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 80px 24px 64px;
        }

        /* ── Hero ── */
        .hero { margin-bottom: 56px; }


        .hero-name {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1.05;
            margin-bottom: 12px;
        }

        .hero-name span { color: var(--accent); }

        .hero-tagline {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .hero-tagline::before {
            content: "$ ";
            color: var(--accent);
        }

        .hero-tagline-availability { margin-bottom: 0; }

        .hero-links {
            display: flex;
            flex-direction: row;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .hero-links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            transition: opacity 0.15s;
        }

        .hero-links a:hover { opacity: 0.7; }

        /* ── About ── */

        .summary p {
            display: flex;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 4px;
        }

        .summary-prompt {
            color: var(--accent);
            flex-shrink: 0;
        }

        /* ── Section headings ── */
        section { margin-bottom: 56px; }

        h2 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }


        /* ── Projects ── */
        .project {
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 12px;
            transition: border-color 0.15s;
        }

        .project:hover { border-color: var(--accent); }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-header-left {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
        }

        .project-name {
            font-weight: 800;
            font-size: 15px;
        }

        .project-header-links {
            display: flex;
            gap: 12px;
        }

        .project-link {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }

        .project-link:hover { color: var(--accent); }

        .project-link.soon {
            color: var(--border);
            cursor: default;
            pointer-events: none;
        }

        .project-status {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .project-status.live {
            color: var(--green);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .project-status.live::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
            animation: blink-dot 2s ease-in-out infinite;
        }

        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .project-status.soon { color: var(--muted); }

        .project-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-stack {
            color: var(--accent);
            font-size: 11px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .link-icon {
            width: 13px;
            height: 13px;
            vertical-align: -2px;
        }

        /* ── Experience ── */
        .exp-item { margin-bottom: 36px; }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 2px;
        }

        .exp-role {
            font-weight: 700;
            font-size: 14px;
        }

        .exp-date {
            color: var(--muted);
            font-size: 12px;
        }

        .exp-company {
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .exp-tagline {
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 10px;
        }

        .exp-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .exp-bullets,
        .project-bullets {
            list-style: none;
        }

        .exp-bullets li,
        .project-bullets li {
            font-size: 13px;
            color: var(--muted);
            padding-left: 16px;
            position: relative;
            margin-bottom: 5px;
            line-height: 1.6;
        }

        .exp-bullets li::before,
        .project-bullets li::before {
            content: ">";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        /* ── Education ── */
        .edu-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }

        .edu-role {
            font-size: 13px;
            font-weight: 700;
        }

        .edu-company {
            font-size: 12px;
            color: var(--muted);
        }

        .edu-date {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ── Interests ── */
        .interests {
            color: var(--muted);
            font-size: 13px;
        }

        .interests a {
            color: var(--accent);
            text-decoration: none;
        }

        .interests a:hover {
            text-decoration: underline;
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            color: var(--muted);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Cursor ── */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hero-name { font-size: 36px; }
            .container { padding: 48px 16px; }
        }
    </style>
    <script async src="https://analytics.victorpatrin.dev/script.js" data-website-id="d5d1ef06-ca93-4a2e-9de9-1e820456ed2d"></script>
</head>
<body>
    <div class="container">
        <header id="hero"></header>
        <section id="about-section"></section>
        <section id="projects-section"></section>
        <section id="experience-section"></section>
        <section id="education-section"></section>
        <section id="interests-section"></section>
        <footer id="footer"></footer>
    </div>
    <script src="content.js"></script>
    <script src="app.js"></script>
</body>
</html>
