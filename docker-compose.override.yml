# Dev overrides — env files + localhost port bindings for direct access.
# Auto-loaded by `docker compose up` (no -f flag needed).
services:
  shared-postgres:
    env_file: ./services/postgres/.env
    ports:
      - "127.0.0.1:5433:5432"

  umami:
    env_file: ./services/umami/.env
    ports:
      - "127.0.0.1:3000:3000"

  uptime-kuma:
    ports:
      - "127.0.0.1:3001:3001"

  grafana:
    env_file: ./services/grafana/.env
    ports:
      - "127.0.0.1:3002:3000"

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  alloy:
    env_file: ./services/alloy/.env
    ports:
      - "127.0.0.1:12345:12345"
