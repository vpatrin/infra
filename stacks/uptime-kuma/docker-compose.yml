name: infra

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma_uptime-kuma-data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:3001\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 256m
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uptime-kuma_uptime-kuma-data:
    external: true

networks:
  internal:
    external: true
