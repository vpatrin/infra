name: infra

services:
  coupette-redis:
    image: redis:8-bookworm
    container_name: coupette-redis
    command: redis-server --save "" --appendonly no --bind 0.0.0.0
    user: redis
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    mem_limit: 64m
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    external: true
