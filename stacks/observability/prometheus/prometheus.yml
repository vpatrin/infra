global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Observability stack monitoring: monitors itself, plus Alloy and Loki
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # Reverse proxy monitoring
  - job_name: "caddy"
    static_configs:
      - targets: ["caddy:2019"]

  # Container metrics (standalone cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # App monitoring
  - job_name: "coupette-backend"
    static_configs:
      - targets: ["coupette-backend:8001"]
